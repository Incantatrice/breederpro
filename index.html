<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#5B3D8F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Furura — Всё о вашем питомце</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:#F6F4FB;color:#1E1433}
    ::-webkit-scrollbar{display:none}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    input:focus,select:focus,textarea:focus{border-color:#8B6FC0!important;box-shadow:0 0 0 3px rgba(139,111,192,0.15);outline:none}
    input,select,button,textarea{font-family:inherit}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;

/* ═══════════ SUPABASE ═══════════ */
const SB_URL="https://zqxuyuaclvwjyrdvkjcv.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxeHV5dWFjbHZ3anlyZHZramN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODQ1MjgsImV4cCI6MjA4ODI2MDUyOH0.kkr9qvszlemPyCwlV7z9hDKARFeMKsejgsQDqhg7ehw";
const sb={
  token:null,
  h(){const h={"apikey":SB_KEY,"Content-Type":"application/json"};h["Authorization"]="Bearer "+(this.token||SB_KEY);return h;},
  async auth(a,b){const r=await fetch(SB_URL+"/auth/v1/"+a,{method:"POST",headers:this.h(),body:JSON.stringify(b)});const d=await r.json();if(!r.ok)throw new Error(d.error_description||d.msg||d.message||"Ошибка");return d;},
  async signUp(e,p,n){const d=await this.auth("signup",{email:e,password:p,data:{full_name:n}});if(d.access_token)this.token=d.access_token;return d;},
  async signIn(e,p){const d=await this.auth("token?grant_type=password",{email:e,password:p});if(d.access_token)this.token=d.access_token;return d;},
  async getUser(){const r=await fetch(SB_URL+"/auth/v1/user",{headers:this.h()});if(!r.ok)return null;return await r.json();},
  signOut(){this.token=null;},
  async sel(t,q=""){const r=await fetch(SB_URL+"/rest/v1/"+t+"?"+q,{headers:{...this.h(),"Prefer":"return=representation"}});if(!r.ok){const e=await r.json();throw new Error(e.message);}return await r.json();},
  async ins(t,d){const r=await fetch(SB_URL+"/rest/v1/"+t,{method:"POST",headers:{...this.h(),"Prefer":"return=representation"},body:JSON.stringify(d)});if(!r.ok){const e=await r.json();throw new Error(e.message);}return await r.json();},
  async upd(t,id,d){const r=await fetch(SB_URL+"/rest/v1/"+t+"?id=eq."+id,{method:"PATCH",headers:{...this.h(),"Prefer":"return=representation"},body:JSON.stringify(d)});if(!r.ok){const e=await r.json();throw new Error(e.message);}return await r.json();},
};

/* ═══════════ PALETTE ═══════════ */
const C={
  bg:"#F6F4FB",bg2:"#EFEDF6",surface:"#FFFFFF",
  purple:"#7C5CBF",purpleDeep:"#5438A0",purpleSoft:"#E4DDFB",purplePale:"#F0EDFA",
  gold:"#C9A84C",goldSoft:"#FBF3DC",goldPale:"#FDF8EC",
  text:"#1E1433",textSec:"#6B5F80",textTer:"#A99DC0",
  green:"#34B85C",greenSoft:"#E9F8EE",
  red:"#E85D5D",redSoft:"#FDE9E9",
  blue:"#4D7CF6",blueSoft:"#E8EFFD",
  orange:"#F0923E",orangeSoft:"#FEF0E0",
  border:"#E5E1F0",
  shadow:"0 2px 12px rgba(30,20,51,0.06)",
  shadowLg:"0 8px 32px rgba(30,20,51,0.10)",
};

const fmtRub=n=>new Intl.NumberFormat("ru-RU").format(n)+" ₽";
const MS=["Я","Ф","М","А","М","И","И","А","С","О","Н","Д"];

/* ═══════════ UI KIT ═══════════ */
const Badge=({children,color=C.purpleDeep,bg=C.purplePale})=>(
  <span style={{display:"inline-block",padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:700,color,background:bg,whiteSpace:"nowrap"}}>{children}</span>
);
const Card=({children,onClick,accent,style:s})=>(
  <div onClick={onClick} style={{background:C.surface,borderRadius:18,padding:"16px 18px",marginBottom:10,boxShadow:C.shadow,cursor:onClick?"pointer":"default",borderLeft:accent?"3px solid "+accent:"none",animation:"fadeIn 0.3s ease",...s}}>{children}</div>
);
const StatCard=({icon,val,label,bg=C.purplePale,color=C.purpleDeep})=>(
  <div style={{flex:1,background:bg,borderRadius:16,padding:"14px 10px",textAlign:"center",minWidth:0}}>
    <div style={{fontSize:18,marginBottom:2}}>{icon}</div>
    <div style={{fontSize:18,fontWeight:800,color,fontFamily:"'Sora',sans-serif"}}>{val}</div>
    <div style={{fontSize:10,color:C.textTer,fontWeight:600,marginTop:2}}>{label}</div>
  </div>
);
const Heading=({children,action,onAction})=>(
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"20px 0 12px"}}>
    <h3 style={{fontSize:16,fontWeight:800,color:C.text,margin:0,fontFamily:"'Sora',sans-serif"}}>{children}</h3>
    {action&&<button onClick={onAction} style={{background:C.purpleDeep,color:"#fff",border:"none",borderRadius:12,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{action}</button>}
  </div>
);
const Empty=({icon,text})=>(<div style={{textAlign:"center",padding:"40px 20px",color:C.textTer}}><div style={{fontSize:40,marginBottom:8}}>{icon}</div><div style={{fontSize:13}}>{text}</div></div>);
const ProgressBar=({value,max,color=C.purple})=>(<div style={{background:C.purplePale,borderRadius:6,height:7,overflow:"hidden",flex:1}}><div style={{width:Math.min((value/max)*100,100)+"%",height:"100%",background:color,borderRadius:6,transition:"width 0.5s ease"}}/></div>);
const MiniChart=({data,height=60})=>{const mx=Math.max(...data,1);return(<div style={{display:"flex",alignItems:"flex-end",gap:3,height}}>{data.map((v,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",maxWidth:22,height:Math.max((v/mx)*(height-14),3),background:"linear-gradient(to top,"+C.purple+","+C.gold+")",borderRadius:5}}/><span style={{fontSize:7,color:C.textTer,fontWeight:600}}>{MS[i]}</span></div>))}</div>);};

/* Modal */
const Modal=({open,onClose,title,children})=>{
  if(!open)return null;
  return(<div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
    <div style={{position:"absolute",inset:0,background:"rgba(30,20,51,0.35)",backdropFilter:"blur(6px)"}}/>
    <div onClick={e=>e.stopPropagation()} style={{position:"relative",background:C.bg,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,maxHeight:"90vh",overflow:"auto",padding:"16px 20px 140px",animation:"slideUp 0.25s ease"}}>
      <div style={{width:32,height:4,background:C.border,borderRadius:2,margin:"0 auto 16px"}}/>
      <h3 style={{fontSize:18,fontWeight:800,color:C.text,margin:"0 0 16px",fontFamily:"'Sora',sans-serif"}}>{title}</h3>
      {children}
    </div>
  </div>);
};
const Field=({label,children})=>(<div style={{marginBottom:12}}><label style={{display:"block",fontSize:10,fontWeight:700,color:C.textSec,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>{label}</label>{children}</div>);
const inp={width:"100%",padding:"11px 14px",borderRadius:12,border:"1.5px solid "+C.border,fontSize:14,color:C.text,background:C.surface,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
const btnP={width:"100%",padding:"14px",borderRadius:14,border:"none",background:C.purpleDeep,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"};
const Spinner=()=>(<div style={{display:"flex",justifyContent:"center",padding:40}}><div style={{width:28,height:28,border:"3px solid "+C.purplePale,borderTopColor:C.purple,borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/></div>);
const ChipFilter=({options,active,onChange})=>(<div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>{options.map(o=>(<button key={o.id} onClick={()=>onChange(o.id)} style={{padding:"7px 14px",borderRadius:10,border:"none",whiteSpace:"nowrap",fontFamily:"inherit",background:active===o.id?C.purpleDeep:C.surface,color:active===o.id?"#fff":C.text,fontSize:12,fontWeight:600,cursor:"pointer",boxShadow:active===o.id?"none":C.shadow}}>{o.label}</button>))}</div>);

/* ═══════════ AUTH ═══════════ */
const AuthScreen=({onAuth})=>{
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[name,setName]=useState("");
  const[err,setErr]=useState("");const[load,setLoad]=useState(false);
  const go=async()=>{setErr("");setLoad(true);try{
    if(mode==="signup"){const d=await sb.signUp(email,pw,name);if(d.access_token)onAuth(d.user);else setErr("Проверьте email для подтверждения");}
    else{const d=await sb.signIn(email,pw);onAuth(d.user);}
  }catch(e){setErr(e.message);}setLoad(false);};
  return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{position:"fixed",top:-60,right:-40,width:200,height:200,borderRadius:"50%",background:C.purpleSoft,opacity:0.4,filter:"blur(60px)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:80,left:-50,width:160,height:160,borderRadius:"50%",background:C.goldSoft,opacity:0.5,filter:"blur(40px)",pointerEvents:"none"}}/>
      <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:340}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:44,marginBottom:8}}>🐾</div>
          <div style={{fontSize:30,fontWeight:800,color:C.purpleDeep,fontFamily:"'Sora',sans-serif",letterSpacing:-0.5}}>furura</div>
          <div style={{fontSize:13,color:C.textSec,marginTop:4}}>Всё о вашем питомце</div>
        </div>
        <div style={{background:C.surface,borderRadius:22,padding:24,boxShadow:C.shadowLg}}>
          <div style={{display:"flex",gap:6,marginBottom:20}}>
            {["login","signup"].map(m=>(<button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,padding:10,borderRadius:12,border:"none",fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer",background:m===mode?C.purpleDeep:C.purplePale,color:m===mode?"#fff":C.text}}>{m==="login"?"Войти":"Регистрация"}</button>))}
          </div>
          {mode==="signup"&&<Field label="Имя"><input style={inp} value={name} onChange={e=>setName(e.target.value)} placeholder="Как вас зовут?"/></Field>}
          <Field label="Email"><input type="email" style={inp} value={email} onChange={e=>setEmail(e.target.value)} placeholder="email@example.com"/></Field>
          <Field label="Пароль"><input type="password" style={inp} value={pw} onChange={e=>setPw(e.target.value)} placeholder="Минимум 6 символов"/></Field>
          {err&&<div style={{background:C.redSoft,borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:C.red}}>{err}</div>}
          <button onClick={go} disabled={load} style={{...btnP,opacity:load?0.6:1}}>{load?"...":mode==="login"?"Войти":"Создать аккаунт"}</button>
        </div>
      </div>
    </div>
  );
};

/* ═══════════ DOG CARD (main entity with nested tabs) ═══════════ */
const DogProfile=({dog,userId,health,shows,groom,setHealth,setShows,setGroom,onBack})=>{
  const[tab,setTab]=useState("info");
  const[showAdd,setShowAdd]=useState(false);
  const myHealth=health.filter(h=>h.dog_id===dog.id);
  const myShows=shows.filter(s=>s.dog_id===dog.id);
  const myGroom=groom.filter(g=>g.dog_id===dog.id);
  const tabs=[{id:"info",label:"Инфо"},{id:"health",label:"Здоровье"},{id:"shows",label:"Выставки"},{id:"groom",label:"Груминг"}];
  const hIcons={"Кардиолог":"❤️","Стоматолог":"🦷","Вакцинация":"💉","МРТ":"🧠","Офтальмолог":"👁","Анализы":"🧪","Обработка":"🧴"};
  const gIcons={"Купание + сушка":"🛁","Стрижка лап + когти":"✂️","Полный груминг":"💇","Чистка ушей":"👂","Расчёсывание":"🪮"};

  /* Add forms state */
  const[hForm,setHF]=useState({date:"",type:"",result:"",next_visit:""});
  const[sForm,setSF]=useState({date:"",judge_name:"",place:"",handler:"",title_earned:"",cost_registration:"",cost_vet_control:"",cost_handler:"",cost_hotel:"",cost_travel:"",cost_other:""});
  const[gForm,setGF]=useState({date:"",procedure_name:"",notes:""});
  const[addType,setAddType]=useState("");

  const addHealth=async()=>{try{const[s]=await sb.ins("health_records",{user_id:userId,dog_id:dog.id,date:hForm.date,type:hForm.type,result:hForm.result,next_visit:hForm.next_visit||null});setHealth(p=>[s,...p]);setShowAdd(false);setHF({date:"",type:"",result:"",next_visit:""});}catch(e){alert(e.message);}};
  const addShow=async()=>{try{const cost=(parseInt(sForm.cost_registration)||0)+(parseInt(sForm.cost_vet_control)||0)+(parseInt(sForm.cost_handler)||0)+(parseInt(sForm.cost_hotel)||0)+(parseInt(sForm.cost_travel)||0)+(parseInt(sForm.cost_other)||0);
    const[s]=await sb.ins("shows",{user_id:userId,dog_id:dog.id,date:sForm.date,judge_name:sForm.judge_name,place:sForm.place,handler:sForm.handler,title_earned:sForm.title_earned||null,cost,cost_registration:parseInt(sForm.cost_registration)||0,cost_vet_control:parseInt(sForm.cost_vet_control)||0,cost_handler:parseInt(sForm.cost_handler)||0,cost_hotel:parseInt(sForm.cost_hotel)||0,cost_travel:parseInt(sForm.cost_travel)||0,cost_other:parseInt(sForm.cost_other)||0});
    setShows(p=>[s,...p]);setShowAdd(false);setSF({date:"",judge_name:"",place:"",handler:"",title_earned:"",cost_registration:"",cost_vet_control:"",cost_handler:"",cost_hotel:"",cost_travel:"",cost_other:""});}catch(e){alert(e.message);}};
  const addGroom=async()=>{try{const[s]=await sb.ins("grooming",{user_id:userId,dog_id:dog.id,date:gForm.date,procedure_name:gForm.procedure_name,notes:gForm.notes||null});setGroom(p=>[s,...p]);setShowAdd(false);setGF({date:"",procedure_name:"",notes:""});}catch(e){alert(e.message);}};

  return(<div>
    {/* Back button + dog header */}
    <button onClick={onBack} style={{background:"none",border:"none",color:C.purpleDeep,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",padding:"4px 0",marginBottom:12}}>← Назад</button>
    <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
      <div style={{width:56,height:56,borderRadius:"50%",background:dog.sex==="F"?C.purpleSoft:C.goldSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,color:dog.sex==="F"?C.purple:C.gold,flexShrink:0}}>{dog.sex==="F"?"♀":"♂"}</div>
      <div><div style={{fontSize:22,fontWeight:800,fontFamily:"'Sora',sans-serif"}}>{dog.name}</div><div style={{fontSize:13,color:C.textSec}}>{dog.breed||"Порода не указана"} · {dog.color||""}</div></div>
    </div>

    {/* Tabs */}
    <div style={{display:"flex",gap:4,marginBottom:16,background:C.bg2,borderRadius:12,padding:3}}>
      {tabs.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"9px 8px",borderRadius:10,border:"none",fontFamily:"inherit",fontSize:12,fontWeight:tab===t.id?700:500,cursor:"pointer",background:tab===t.id?C.surface:"transparent",color:tab===t.id?C.text:C.textTer,boxShadow:tab===t.id?C.shadow:"none",transition:"all 0.2s"}}>{t.label}</button>))}
    </div>

    {/* INFO TAB */}
    {tab==="info"&&(<div>
      {[
        {l:"Дата рождения",v:dog.born||"—"},
        {l:"Статус",v:dog.status||"—"},
        {l:"В разведении",v:dog.breeding?"Да":"Нет"},
        {l:"Родословная (РКФ)",v:dog.pedigree_number||"—"},
        {l:"Чип",v:dog.chip_number||"—"},
        {l:"Клеймо",v:dog.tattoo_number||"—"},
      ].map((r,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:i<5?"1px solid "+C.border:"none"}}>
        <span style={{fontSize:13,color:C.textSec}}>{r.l}</span>
        <span style={{fontSize:13,fontWeight:600}}>{r.v}</span>
      </div>))}
    </div>)}

    {/* HEALTH TAB */}
    {tab==="health"&&(<div>
      <Heading action="+ Запись" onAction={()=>{setAddType("health");setShowAdd(true);}}>Вет. журнал</Heading>
      {myHealth.length===0&&<Empty icon="🏥" text="Записей пока нет"/>}
      {myHealth.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(h=>(
        <Card key={h.id} accent={C.purple}><div style={{display:"flex",gap:10}}>
          <div style={{width:38,height:38,borderRadius:12,background:C.purplePale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{hIcons[h.type]||"📋"}</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:700,fontSize:13}}>{h.type}</span><span style={{fontSize:11,color:C.textTer}}>{h.date}</span></div>
            {h.result&&<div style={{fontSize:12,color:C.textSec,marginTop:3}}>{h.result}</div>}
            {h.next_visit&&<div style={{fontSize:11,color:C.orange,fontWeight:600,marginTop:3}}>→ Следующий: {h.next_visit}</div>}
          </div>
        </div></Card>))}
    </div>)}

    {/* SHOWS TAB */}
    {tab==="shows"&&(<div>
      <Heading action="+ Выставка" onAction={()=>{setAddType("show");setShowAdd(true);}}>Выставки</Heading>
      {myShows.length===0&&<Empty icon="🏆" text="Выставок пока нет"/>}
      {myShows.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(s=>{
        const total=(s.cost_registration||0)+(s.cost_vet_control||0)+(s.cost_handler||0)+(s.cost_hotel||0)+(s.cost_travel||0)+(s.cost_other||0);
        return(<Card key={s.id} accent={s.title_earned?C.gold:undefined}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14}}>Судья: {s.judge_name||"—"}</div>
              <div style={{fontSize:12,color:C.textSec,marginTop:2}}>{s.place} · {s.date}</div>
              {s.handler&&<div style={{fontSize:11,color:C.textTer,marginTop:2}}>Хэндлер: {s.handler}</div>}
            </div>
            <div style={{textAlign:"right"}}>{s.title_earned&&<Badge color={C.gold} bg={C.goldPale}>{s.title_earned}</Badge>}
              <div style={{fontSize:13,color:C.red,fontWeight:700,marginTop:4}}>{fmtRub(total||s.cost||0)}</div>
            </div>
          </div>
          {/* Expense breakdown */}
          {total>0&&<div style={{marginTop:10,paddingTop:8,borderTop:"1px solid "+C.border,display:"flex",flexWrap:"wrap",gap:6}}>
            {[["Регистрация",s.cost_registration],["Вет.контроль",s.cost_vet_control],["Хэндлер",s.cost_handler],["Отель",s.cost_hotel],["Дорога",s.cost_travel],["Другое",s.cost_other]].filter(([,v])=>v>0).map(([l,v],i)=>(
              <span key={i} style={{fontSize:10,color:C.textSec,background:C.bg2,padding:"3px 8px",borderRadius:6}}>{l}: {fmtRub(v)}</span>
            ))}
          </div>}
        </Card>);})}
    </div>)}

    {/* GROOM TAB */}
    {tab==="groom"&&(<div>
      <Heading action="+ Процедура" onAction={()=>{setAddType("groom");setShowAdd(true);}}>Груминг</Heading>
      {myGroom.length===0&&<Empty icon="✂️" text="Записей пока нет"/>}
      {myGroom.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(g=>(
        <Card key={g.id}><div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{width:38,height:38,borderRadius:12,background:C.purplePale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{gIcons[g.procedure_name]||"✨"}</div>
          <div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,fontSize:13}}>{g.procedure_name}</span><span style={{fontSize:11,color:C.textTer}}>{g.date}</span></div>
            {g.notes&&<div style={{fontSize:12,color:C.textSec,marginTop:2}}>{g.notes}</div>}
          </div>
        </div></Card>))}
    </div>)}

    {/* ADD MODALS */}
    <Modal open={showAdd&&addType==="health"} onClose={()=>setShowAdd(false)} title="Запись о здоровье">

/* ═══════════ BOARDING ═══════════ */
const Boarding=({userId,boarding,setBoarding})=>{
  const[showAdd,setShowAdd]=useState(false);const[filter,setFilter]=useState("all");const[detail,setDetail]=useState(null);
  const[form,setForm]=useState({dog_name:"",breed:"",owner_name:"",owner_phone:"",owner_telegram:"",date_in:"",date_out:"",daily_rate:"",prepaid:"0",notes:""});
  const filtered=filter==="all"?boarding:boarding.filter(b=>b.status===filter);
  const getDays=(a,b)=>Math.max(Math.ceil((new Date(b)-new Date(a))/864e5),0);
  const stM={active:{l:"Сейчас",c:C.green,bg:C.greenSoft},upcoming:{l:"Ожидает",c:C.blue,bg:C.blueSoft},completed:{l:"Готово",c:C.textTer,bg:C.purplePale}};
  const add=async()=>{try{const[s]=await sb.ins("boarding",{user_id:userId,...form,daily_rate:parseInt(form.daily_rate)||0,prepaid:parseInt(form.prepaid)||0,status:"upcoming"});setBoarding(p=>[s,...p]);setShowAdd(false);setForm({dog_name:"",breed:"",owner_name:"",owner_phone:"",owner_telegram:"",date_in:"",date_out:"",daily_rate:"",prepaid:"0",notes:""});}catch(e){alert(e.message);}};
  const updSt=async(id,st)=>{try{await sb.upd("boarding",id,{status:st});setBoarding(p=>p.map(b=>b.id===id?{...b,status:st}:b));setDetail(null);}catch(e){alert(e.message);}};
  return(<div>
    <div style={{fontSize:22,fontWeight:800,fontFamily:"'Sora',sans-serif",marginBottom:14}}>Передержка</div>
    <ChipFilter options={[{id:"all",label:"Все"},{id:"active",label:"🟢 Сейчас"},{id:"upcoming",label:"🔵 Ожидают"},{id:"completed",label:"Готово"}]} active={filter} onChange={setFilter}/>
    <Heading action="+ Запись" onAction={()=>setShowAdd(true)}>Записи</Heading>
    {filtered.length===0&&<Empty icon="🏠" text="Нет записей"/>}
    {filtered.sort((a,b)=>{const o={active:0,upcoming:1,completed:2};return(o[a.status]||9)-(o[b.status]||9);}).map(b=>{
      const st=stM[b.status]||stM.upcoming,days=getDays(b.date_in,b.date_out),total=days*b.daily_rate;
      return(<Card key={b.id} onClick={()=>setDetail(b)} accent={st.c}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{fontWeight:700,fontSize:14}}>🐕 {b.dog_name}</span><Badge color={st.c} bg={st.bg}>{st.l}</Badge></div>
        <div style={{fontSize:12,color:C.textTer,marginBottom:6}}>{b.breed} · {b.owner_name}</div>
        <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:C.textSec}}>{days} дн.</span><span style={{fontWeight:800,fontSize:14,color:C.green,fontFamily:"'Sora',sans-serif"}}>{fmtRub(total)}</span></div>
      </Card>);})}
    <Modal open={!!detail} onClose={()=>setDetail(null)} title={detail?"🐕 "+detail.dog_name:""}>
      {detail&&(()=>{const b=detail,days=getDays(b.date_in,b.date_out),total=days*b.daily_rate,debt=total-b.prepaid;return(<div>
        <Card><div style={{fontSize:13,fontWeight:700,marginBottom:6}}>👤 {b.owner_name}</div>{b.owner_phone&&<a href={"tel:"+b.owner_phone} style={{fontSize:13,color:C.blue,textDecoration:"none",display:"block"}}>📞 {b.owner_phone}</a>}{b.owner_telegram&&<div style={{fontSize:13,color:C.blue,marginTop:2}}>✈️ {b.owner_telegram}</div>}</Card>
        <Card><div style={{fontSize:13}}>Итого: <b style={{color:C.green}}>{fmtRub(total)}</b> · Предоплата: {fmtRub(b.prepaid)}{debt>0&&<span style={{color:C.red,fontWeight:700}}> · Долг: {fmtRub(debt)}</span>}</div></Card>
        {b.notes&&<Card accent={C.orange}><div style={{fontSize:13}}>📝 {b.notes}</div></Card>}
        {b.status==="upcoming"&&<button onClick={()=>updSt(b.id,"active")} style={{...btnP,background:C.green,marginTop:8}}>Принять</button>}
        {b.status==="active"&&<button onClick={()=>updSt(b.id,"completed")} style={{...btnP,marginTop:8}}>Завершить</button>}
      </div>);})()}
    </Modal>
    <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Новая передержка">
      <Field label="Кличка"><input style={inp} value={form.dog_name} onChange={e=>setForm({...form,dog_name:e.target.value})}/></Field>
      <Field label="Порода"><input style={inp} value={form.breed} onChange={e=>setForm({...form,breed:e.target.value})}/></Field>
      <div style={{background:C.bg2,borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.textSec,marginBottom:8,textTransform:"uppercase"}}>👤 Владелец</div>
        <Field label="ФИО"><input style={inp} value={form.owner_name} onChange={e=>setForm({...form,owner_name:e.target.value})}/></Field>
        <Field label="Телефон"><input type="tel" style={inp} value={form.owner_phone} onChange={e=>setForm({...form,owner_phone:e.target.value})}/></Field>
        <Field label="Telegram"><input style={inp} value={form.owner_telegram} onChange={e=>setForm({...form,owner_telegram:e.target.value})}/></Field>
      </div>
      <div style={{display:"flex",gap:8}}><div style={{flex:1}}><Field label="Заезд"><input type="date" style={inp} value={form.date_in} onChange={e=>setForm({...form,date_in:e.target.value})}/></Field></div><div style={{flex:1}}><Field label="Выезд"><input type="date" style={inp} value={form.date_out} onChange={e=>setForm({...form,date_out:e.target.value})}/></Field></div></div>
      <div style={{display:"flex",gap:8}}><div style={{flex:1}}><Field label="₽/день"><input type="number" style={inp} value={form.daily_rate} onChange={e=>setForm({...form,daily_rate:e.target.value})}/></Field></div><div style={{flex:1}}><Field label="Предоплата"><input type="number" style={inp} value={form.prepaid} onChange={e=>setForm({...form,prepaid:e.target.value})}/></Field></div></div>
      <Field label="Особенности"><textarea style={{...inp,minHeight:70,resize:"vertical"}} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/></Field>
      <button onClick={add} style={btnP}>Сохранить</button>
    </Modal>
  </div>);

    {litters.length===0&&<Empty icon="🐾" text="Помётов пока нет"/>}
    {litters.map(l=>(<Card key={l.id}><div style={{fontWeight:700,fontSize:15,fontFamily:"'Sora',sans-serif"}}>♂ {l.father_name||"—"}</div><div style={{fontSize:12,color:C.textTer,marginTop:4}}>{l.mating_date?"Вязка: "+l.mating_date:""}{l.birth_date?" · Рождение: "+l.birth_date:""}</div>
      <div style={{display:"flex",gap:8,marginTop:10}}><div style={{flex:1,background:C.purplePale,borderRadius:12,padding:"8px",textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:C.purpleDeep}}>{l.puppies_count||0}</div><div style={{fontSize:9,color:C.textTer}}>щенков</div></div><div style={{flex:1,background:C.greenSoft,borderRadius:12,padding:"8px",textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:C.green}}>{l.sold||0}</div><div style={{fontSize:9,color:C.textTer}}>продано</div></div></div>
    </Card>))}
    <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Новый помёт">
      <Field label="Отец"><input style={inp} value={form.father_name} onChange={e=>setForm({...form,father_name:e.target.value})}/></Field>
      <Field label="Дата вязки"><input type="date" style={inp} value={form.mating_date} onChange={e=>setForm({...form,mating_date:e.target.value})}/></Field>
      <Field label="Дата рождения"><input type="date" style={inp} value={form.birth_date} onChange={e=>setForm({...form,birth_date:e.target.value})}/></Field>
      <Field label="Щенков"><input type="number" style={inp} value={form.puppies_count} onChange={e=>setForm({...form,puppies_count:e.target.value})}/></Field>
      <button onClick={add} style={btnP}>Сохранить</button>
    </Modal>
  </div>);
};

/* ═══════════ SIDEBAR NAV ═══════════ */
const NAV=[{id:"overview",icon:"📊",label:"Обзор"},{id:"finance",icon:"💰",label:"Финансы"},{id:"litters",icon:"🐾",label:"Помёты"},{id:"boarding",icon:"🏠",label:"Передержка"}];

/* ═══════════ MAIN APP ═══════════ */
function App(){
  const[user,setUser]=useState(null);const[loading,setLoading]=useState(true);
  const[page,setPage]=useState("overview");const[selectedDog,setSelectedDog]=useState(null);
  const[sideOpen,setSideOpen]=useState(false);
  const[dogs,setDogs]=useState([]);const[income,setIncome]=useState([]);const[expenses,setExpenses]=useState([]);
  const[health,setHealth]=useState([]);const[shows,setShows]=useState([]);const[litters,setLitters]=useState([]);
  const[groom,setGroom]=useState([]);const[boarding,setBoarding]=useState([]);

  useEffect(()=>{try{const t=sessionStorage.getItem("fu_token");if(t){sb.token=t;sb.getUser().then(u=>{if(u?.id)setUser(u);else sb.token=null;setLoading(false);}).catch(()=>setLoading(false));}else setLoading(false);}catch(e){setLoading(false);}},[]);
  useEffect(()=>{if(!user)return;Promise.all([sb.sel("dogs","order=name.asc"),sb.sel("income","order=date.desc"),sb.sel("expenses","order=date.desc"),sb.sel("health_records","order=date.desc"),sb.sel("shows","order=date.desc"),sb.sel("litters","order=created_at.desc"),sb.sel("grooming","order=date.desc"),sb.sel("boarding","order=date_in.desc")]).then(([d,i,e,h,s,l,g,b])=>{setDogs(d);setIncome(i);setExpenses(e);setHealth(h);setShows(s);setLitters(l);setGroom(g);setBoarding(b);}).catch(console.error);},[user]);
  const onAuth=u=>{setUser(u);try{sessionStorage.setItem("fu_token",sb.token);}catch(e){}};
  const logout=()=>{sb.signOut();try{sessionStorage.removeItem("fu_token");}catch(e){}setUser(null);};

  if(loading)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner/></div>;
  if(!user)return<AuthScreen onAuth={onAuth}/>;

  const uid=user.id;
  const onDogClick=d=>{setSelectedDog(d);setPage("dogProfile");};
  const onDogBack=()=>{setSelectedDog(null);setPage("overview");};

  const renderPage=()=>{
    if(page==="dogProfile"&&selectedDog)return<DogProfile dog={selectedDog} userId={uid} health={health} shows={shows} groom={groom} setHealth={setHealth} setShows={setShows} setGroom={setGroom} onBack={onDogBack}/>;
    switch(page){
      case"overview":return<Overview dogs={dogs} income={income} expenses={expenses} health={health} onDogClick={onDogClick} userId={uid} setDogs={setDogs}/>;
      case"finance":return<Finance userId={uid} income={income} expenses={expenses} setIncome={setIncome} setExpenses={setExpenses} dogs={dogs}/>;
      case"litters":return<Litters userId={uid} litters={litters} setLitters={setLitters}/>;
      case"boarding":return<Boarding userId={uid} boarding={boarding} setBoarding={setBoarding}/>;
    }
  };

  return(
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative"}}>
      {/* Decorative */}
      <div style={{position:"fixed",top:-50,right:-40,width:180,height:180,borderRadius:"50%",background:C.purpleSoft,opacity:0.35,filter:"blur(50px)",pointerEvents:"none",zIndex:0}}/>

      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 20px 12px",position:"relative",zIndex:2}}>
        <button onClick={()=>setSideOpen(!sideOpen)} style={{width:40,height:40,borderRadius:12,background:C.surface,border:"none",cursor:"pointer",boxShadow:C.shadow,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>☰</button>
        <div style={{fontSize:20,fontWeight:800,color:C.purpleDeep,fontFamily:"'Sora',sans-serif",letterSpacing:-0.5}}>furura</div>
        <button onClick={logout} style={{width:40,height:40,borderRadius:12,background:C.surface,border:"none",cursor:"pointer",boxShadow:C.shadow,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}} title="Выйти">🚪</button>
      </div>

      {/* Sidebar overlay */}
      {sideOpen&&<div onClick={()=>setSideOpen(false)} style={{position:"fixed",inset:0,background:"rgba(30,20,51,0.3)",zIndex:50,backdropFilter:"blur(4px)"}}/>}

      {/* Sidebar */}
      <div style={{position:"fixed",left:sideOpen?0:-260,top:0,bottom:0,width:250,background:C.surface,zIndex:60,boxShadow:sideOpen?C.shadowLg:"none",transition:"left 0.25s ease",padding:"60px 16px 20px",display:"flex",flexDirection:"column"}}>
        <div style={{fontSize:22,fontWeight:800,color:C.purpleDeep,fontFamily:"'Sora',sans-serif",marginBottom:24,paddingLeft:4}}>furura</div>
        {NAV.map(n=>(<button key={n.id} onClick={()=>{setPage(n.id==="overview"?"overview":n.id);setSideOpen(false);setSelectedDog(null);}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 12px",borderRadius:14,border:"none",background:page===n.id||(n.id==="overview"&&page==="dogProfile")?C.purplePale:"transparent",color:page===n.id||(n.id==="overview"&&page==="dogProfile")?C.purpleDeep:C.textSec,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:4,width:"100%",textAlign:"left"}}>
          <span style={{fontSize:18}}>{n.icon}</span>{n.label}
        </button>))}
        <div style={{flex:1}}/>
        <div style={{fontSize:11,color:C.textTer,padding:"8px 12px"}}>{user.email}</div>
      </div>

      {/* Content */}
      <div style={{padding:"4px 18px 40px",position:"relative",zIndex:1}}>{renderPage()}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
